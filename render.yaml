# Render Blueprint - SurgePay Dashboard
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: surgepay-dashboard
    runtime: node
    region: oregon

    buildCommand: npm ci && npm run build
    startCommand: npm start -- -p $PORT

    envVars:
      - key: NODE_VERSION
        value: 18
      - key: NODE_OPTIONS
        value: --max-old-space-size=512
      - key: PORT
        value: 10000
      # Add your env vars in Render Dashboard: Environment → Environment Variables
      # SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY, ALCHEMY_TOKEN, etc.
